name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
      # gopls modernize analyzers (range-over-int, slices/maps helpers, min/max,
      # etc.) — not part of golangci-lint's standard set, so gate them here.
      - run: go run golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@v0.22.0 ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            target: linux-amd64
          - goos: linux
            goarch: arm64
            target: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            target: linux-armv7
          - goos: darwin
            goarch: amd64
            target: darwin-amd64
          - goos: darwin
            goarch: arm64
            target: darwin-arm64
          - goos: windows
            goarch: amd64
            target: windows-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} go build -o nickpit-${{ matrix.target }} ./cmd/nickpit
