apiVersion: v2
name: nickpit-serve
description: NickPit GitLab webhook review daemon (`nickpit gitlab serve`)
type: application
# Chart version. Bump on template changes.
version: 0.1.0
# Container image tag used when image.tag is empty. Matches the ghcr.io tag
# published by .github/workflows/docker.yml on `v*` git tags (plus `latest`).
appVersion: "latest"
home: https://github.com/dgrieser/nickpit
sources:
  - https://github.com/dgrieser/nickpit
maintainers:
  - name: David Grieser
keywords:
  - gitlab
  - code-review
  - webhook
  - llm
