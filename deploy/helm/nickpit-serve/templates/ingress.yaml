{{- if .Values.ingress.enabled -}}
{{- $fullName := include "nickpit-serve.fullname" . -}}
{{- $host := required "ingress.host is required while ingress is enabled: --set ingress.host=nickpit.example.com" .Values.ingress.host -}}
{{- $className := required "ingress.className is required while ingress is enabled: --set ingress.className=nginx-internal" .Values.ingress.className -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "nickpit-serve.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType | quote }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  name: http
{{- end }}
