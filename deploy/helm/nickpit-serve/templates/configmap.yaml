apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nickpit-serve.fullname" . }}
  labels:
    {{- include "nickpit-serve.labels" . | nindent 4 }}
data:
  {{- with .Values.config.nickpitYaml }}
  nickpit.yaml: |
    {{- . | nindent 4 }}
  {{- end }}
  server.yaml: |
    {{- include "nickpit-serve.serverYaml" . | nindent 4 }}
