# Default values for nickpit-serve.

# -- Number of daemon replicas. MUST stay 1: the daemon holds an in-memory
# review queue and a per-(project,iid,sha) "already reviewed" LRU. Two replicas
# behind one Service would each receive a share of webhooks and could review the
# same MR twice (comment publishing is idempotent via fingerprints, so it is not
# catastrophic, but it wastes LLM calls).
replicaCount: 1

image:
  repository: ghcr.io/dgrieser/nickpit
  # REQUIRED, no default — pass at install time (--set image.tag=v0.0.x or a
  # values file) so the running version has a single, deliberate source.
  # The image is published by the repo's Docker workflow on `v*` tags.
  tag: ""
  pullPolicy: IfNotPresent

# Image pull secrets, e.g. for a private ghcr.io package.
# - name: ghcr-pull-secret
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  # The daemon never calls the Kubernetes API; no token needs mounting.
  automount: false
  annotations: {}

# Extra pod annotations (merged with the config checksum annotation that forces
# a rollout when the ConfigMap changes).
podAnnotations: {}
podLabels: {}

# Pod-level security context. The image runs as the distroless "nonroot" user.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context. The image ships git + config via env, so the
# root filesystem can be read-only; writable paths are emptyDir mounts.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  # GitLab must be able to POST webhooks to the daemon, so external reachability
  # is usually required. Set `host` before installing.
  enabled: true
  # Ingress class serving the webhook host. REQUIRED (no default) while
  # ingress is enabled — pass it at install time:
  #   --set ingress.className=nginx-internal
  className: ""
  annotations: {}
  # Public hostname GitLab sends webhooks to. REQUIRED (no default) while
  # ingress is enabled — pass it at install time:
  #   --set ingress.host=nickpit.example.com
  host: ""
  # Only the webhook path needs to be public; /healthz stays cluster-internal.
  path: /webhooks/gitlab
  pathType: Prefix
  # With secretName empty the ingress controller serves its default
  # certificate — enough when that is a wildcard covering the host
  # For a cert-manager per-host cert instead, set secretName and add
  # annotation kubernetes.io/tls-acme: "true".
  tls:
    enabled: true
    secretName: ""

# Container resources. Reviews clone the repo (git) and stream from the LLM;
# concurrency is bounded by serve.reviewConcurrency.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Ephemeral scratch volumes (root fs is read-only). work holds git clones +
# per-review logs; tmp and home cover git's incidental writes.
volumes:
  work:
    sizeLimit: 5Gi
  tmp:
    sizeLimit: 1Gi
  home:
    sizeLimit: 256Mi

# MUST exceed serve.shutdownGrace (600s for "10m") so Kubernetes lets in-flight
# reviews finish before SIGKILL. 660 = 10m grace + 60s buffer.
terminationGracePeriodSeconds: 660

# Extra daemon flags. --verbose and --json toggle the daemon's own slog output.
verbose: false
jsonLog: false
extraArgs: []

# Guards the init window: the daemon resolves each group token's bot-user ID via
# GitLab lookups before /healthz serves. Liveness/readiness are suppressed until
# this passes, so a slow GitLab can't trigger a crash loop. ~60s window.
startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 3
  failureThreshold: 20
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Secrets. Do NOT commit real values here. The Secret serves two purposes:
#   - env vars: every key that is a valid env var name is injected via envFrom
#     and pulled into the two config files via ${VAR} expansion (both files are
#     env-expanded before YAML parsing) — e.g. MITTWALD_LLM_API_KEY.
#   - group inventory: the key named by serve.groupsSecretKey (default
#     groups.yaml) holds the full GitLab group list, tokens included, so adding
#     a group only touches the Secret — never this file. It is mounted as a
#     file, not injected as env (a dotted key is skipped by envFrom anyway).
#
# Provide values one of two ways:
#   1. existingSecret: reference a Secret you created out-of-band (recommended
#      for prod; e.g. from Vault / External Secrets).
#   2. secrets: let the chart create the Secret from the map below. Populate at
#      install time via `--set-file` / `--set`, never in a committed values
#      file, e.g.:  --set-file secrets.groups\.yaml=my-groups.yaml
# ---------------------------------------------------------------------------
existingSecret: ""
secrets:
  MITTWALD_LLM_API_KEY: ""
  # Group inventory (see serve.groupsSecretKey). Shape per entry: path = group
  # full path (longest-prefix matched at '/' boundaries), token = group access
  # token, and exactly one of signing_token (whsec_... from GitLab's "Generate
  # signing token", shown once at webhook creation; HMAC-SHA256, recommended)
  # or webhook_secret (legacy plaintext X-Gitlab-Token).
  # groups.yaml: |
  #   groups:
  #     - path: "mygroup"
  #       token: "glpat-..."
  #       signing_token: "whsec_..."
  # Optional; only if reviewing GitHub repos too.
  # NICKPIT_GITHUB_TOKEN: ""

# ---------------------------------------------------------------------------
# serve.yaml — daemon config (groups, trigger policy). Rendered to a ConfigMap.
# token / signing_token / webhook_secret values are pulled from env (the Secret
# above) via the *Env fields, so no secret text lands in the ConfigMap.
# ---------------------------------------------------------------------------
serve:
  listen: ":8080"
  logDir: "/work/logs"
  reviewConcurrency: 2
  shutdownGrace: "10m"
  # GitLab instance the webhooks come from and reviews are posted to. REQUIRED
  # (no default) — pass it at install time:
  #   --set serve.gitlabBaseURL=https://gitlab.example.com
  gitlabBaseURL: ""
  topic: "nickpit"
  triggerEmoji: "nickpit"
  # "eyes" awarded at review start; "" disables. Must differ from triggerEmoji.
  startEmoji: "eyes"
  commandKeyword: "nickpit"
  # Reaction awarded on a /nickpit review command note. "eyes" = on it; "" disables.
  ackEmoji: "eyes"
  # Reaction awarded on a /nickpit abort command note. "stop_button"; "" disables.
  abortEmoji: "stop_button"
  # Where the GitLab group inventory comes from. Default: the Secret key named
  # here is mounted at /etc/nickpit/groups.yaml and referenced from server.yaml
  # via groups_file, so groups (paths + tokens) live entirely in the Secret and
  # adding one never touches chart values. Set to "" to disable and list groups
  # inline below instead. At least one of the two sources must be configured.
  groupsSecretKey: "groups.yaml"
  # Optional inline groups, rendered into the ConfigMap with ${ENV} token
  # references (merged with the groups file when both are set). path = group
  # full path (longest-prefix matched at '/' boundaries). tokenEnv names the
  # env var (Secret key) holding the group access token. For webhook
  # verification set exactly one of:
  #   signingTokenEnv  - GitLab signing token (whsec_..., HMAC-SHA256, recommended)
  #   webhookSecretEnv - legacy plaintext secret token (X-Gitlab-Token)
  # groups:
  #   - path: "mygroup"
  #     tokenEnv: "NICKPIT_GROUP_MYGROUP_TOKEN"
  #     signingTokenEnv: "NICKPIT_GROUP_MYGROUP_SIGNING_TOKEN"
  groups: []
  review:
    # Extra args appended to every `nickpit gitlab mr --publish` child. This is
    # where the LLM profile is selected; pass it at install time, e.g.:
    #   --set serve.review.extraArgs='{--profile,mittwald}'
    # Empty = children use the binary's default profile (openrouter; needs
    # OPENROUTER_API_KEY in the Secret).
    extraArgs: []

# ---------------------------------------------------------------------------
# Optional .nickpit.yaml override for the review children. Empty (default):
# no file is rendered or mounted and children run on the binary's built-in
# profiles — serve.review.extraArgs selects one (e.g. --profile mittwald),
# the API key arrives via the Secret env, and the group token/base URL are
# injected per review. Set a full YAML document only for changes the
# built-ins cannot express (custom endpoint, new profile); ${VAR} refs are
# env-expanded, so secrets stay out of the ConfigMap:
#   nickpitYaml: |
#     active_profile: custom
#     profiles:
#       custom:
#         base_url: https://other-endpoint.example/v1
#         api_key: ${MY_LLM_API_KEY}
#         model: some-model
# ---------------------------------------------------------------------------
config:
  nickpitYaml: ""
