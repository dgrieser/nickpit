# Styleguide mappings are embedded into the binary and decide which files from
# prompts/styleguides/ are sent to review, verify, finalize, verdict, and
# summarize agents.
#
# style_guides:
#   Maps a styleguide language key to a Markdown file under prompts/. An entry
#   is either a scalar file path (used for every version) or a mapping with a
#   `default` plus version-specific `versions` overrides keyed by a version or
#   semver range (e.g. "1.19", ">=1.22"). When a detected toolchain version
#   (from go.mod, Dockerfile, CI, ...) matches a version key, that guide is used
#   instead of the default. Conflicting detections are resolved by
#   version_source_priority; within one source tier the lowest version wins.
#   Add a new key here when adding a new styleguide file.
#
# version_source_priority:
#   Ordered source patterns per language, most authoritative first. Patterns
#   are matched case-insensitively against the Source of each detected
#   toolchain version and may use path.Match globs (".github/workflows/*")
#   with "/" as separator. A pattern without a slash matches the source's
#   base name, so nested manifests (services/api/go.mod) rank like root ones.
#   Only versions from the highest-priority tier that produced a usable
#   version take part in styleguide version selection, so a stale Dockerfile
#   cannot drag the guide below what go.mod declares. Sources not listed rank
#   together after every listed tier; languages without an entry keep the
#   plain lowest-version-wins behavior.
#
# style_guide_order:
#   Stable output order for selected guides. Every entry must exist in
#   style_guides. Add new guides here if prompt order should be deterministic.
#
# extension_overrides:
#   Overrides language detection only for styleguide selection. This is useful
#   when the general file language is broader than the guide split, for example
#   mapping .ts/.tsx to the TypeScript guide while general file detection groups
#   those extensions as nodejs.
#
# detectors:
#   Adds extra styleguides based on paths or content signals, including embedded
#   languages such as SQL in Go code or Kubernetes YAML in Helm templates.
#   `probe_paths` decides which changed or supplemental files are worth reading
#   for content-based detection. `match_any` adds the guide if any listed
#   matcher hits. `match_all` adds the guide only if every non-empty matcher
#   group hits at least once.
#
# Supported matcher keys:
#   extensions, basenames, basename_suffixes, path_segments, path_prefixes,
#   path_contains, content_contains, content_regex
#
# Path matching is lowercased and slash-normalized. content_contains is
# case-sensitive. content_regex uses Go regular expressions; prefer simple,
# bounded expressions because detectors run over changed-file content.
style_guides:
  go:
    default: styleguides/go.md
    versions:
      "1.19": styleguides/go-1.19.md
      "1.20": styleguides/go-1.20.md
      "1.21": styleguides/go-1.21.md
      "1.22": styleguides/go-1.22.md
      "1.23": styleguides/go-1.23.md
      "1.24": styleguides/go-1.24.md
      "1.25": styleguides/go-1.25.md
      "1.26": styleguides/go-1.26.md
  python:
    default: styleguides/python.md
    versions:
      "2.7": styleguides/python-2.7.md
      ">=3.0 <3.7": styleguides/python-3.6.md
      ">=3.7 <3.9": styleguides/python-3.8.md
      ">=3.9 <3.10": styleguides/python-3.9.md
  javascript: styleguides/javascript.md
  typescript: styleguides/typescript.md
  html: styleguides/html-css.md
  css: styleguides/html-css.md
  scss: styleguides/html-css.md
  csharp: styleguides/csharp.md
  sql: styleguides/sql.md
  shell: styleguides/bash.md
  helm: styleguides/helm.md
  kubernetes: styleguides/kubernetes.md

version_source_priority:
  go:
    - go.mod
    - .tool-versions
    - .github/workflows/*
    - .gitlab-ci.yml
    - Dockerfile
  python:
    - pyproject.toml
    - Pipfile
    - setup.cfg
    - setup.py
    - .python-version
    - runtime.txt
    - .tool-versions
    - .github/workflows/*
    - .gitlab-ci.yml
    - Dockerfile
  javascript:
    - package.json
    - .nvmrc
    - .node-version
    - .tool-versions
    - .github/workflows/*
    - .gitlab-ci.yml
    - Dockerfile
  typescript:
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml
    - package.json

style_guide_order:
  - go
  - python
  - javascript
  - typescript
  - html
  - css
  - scss
  - csharp
  - sql
  - shell
  - helm
  - kubernetes

extension_overrides:
  javascript:
    - .js
    - .mjs
    - .cjs
    - .jsx
  typescript:
    - .ts
    - .mts
    - .cts
    - .tsx

detectors:
  - language: sql
    probe_paths:
      extensions: [.go, .py, .js, .jsx, .ts, .tsx, .cs, .java, .kt, .rb, .php, .sql]
      path_segments: [migrations, migration, db, database, queries, schema]
    match_any:
      extensions: [.sql]
      content_regex:
        - '(?is)\bselect\b.+\bfrom\b'
        - '(?is)\binsert\s+into\b'
        - '(?is)\bupdate\b.+\bset\b'
        - '(?is)\bdelete\s+from\b'
        - '(?is)\bcreate\s+(?:table|index)\b'
        - '(?is)\balter\s+table\b'
        - '(?is)\bexplain(?:\s+analyze)?\b'
        - '(?is)\bwith\b.+\bselect\b'

  - language: shell
    probe_paths:
      extensions: [.sh, .bash, .zsh, .ksh, .yaml, .yml]
      path_segments: [scripts, bin, ci]
      path_prefixes: [.github/scripts/, .git/hooks/]
      path_contains: [/.github/scripts/, /.git/hooks/, .github/scripts/, .git/hooks/]
    match_any:
      content_contains:
        - shellcheck
        - set -Eeuo pipefail
        - set -euo pipefail
        - '[['
        - declare -a
        - declare -A
        - BASH_SOURCE
        - ' trap '
      content_regex:
        - '(?m)^#!.*(?:bash|/sh|env sh)\b'
        - '\$\{[A-Za-z_][A-Za-z0-9_]*:\?[^}]*\}'

  - language: html
    probe_paths:
      extensions: [.js, .jsx, .ts, .tsx, .vue, .svelte, .astro, .razor, .cshtml, .html, .htm, .css, .scss, .sass]
    match_any:
      extensions: [.jsx, .tsx, .vue, .svelte, .astro, .razor, .cshtml, .html, .htm, .css, .scss, .sass]
      content_contains:
        - <style
        - aria-
        - styled.
        - 'css`'
        - '@media'
      content_regex:
        - '(?is)<(?:a|abbr|address|article|aside|audio|b|base|bdi|bdo|blockquote|body|br|button|canvas|caption|cite|code|col|colgroup|data|datalist|dd|del|details|dfn|dialog|div|dl|dt|em|embed|fieldset|figcaption|figure|footer|form|h[1-6]|head|header|hr|html|i|iframe|img|input|ins|kbd|label|legend|li|link|main|map|mark|menu|meta|meter|nav|noscript|object|ol|option|output|p|picture|pre|progress|q|rp|rt|ruby|s|samp|script|section|select|slot|small|source|span|strong|style|sub|summary|sup|svg|table|tbody|td|template|textarea|tfoot|th|thead|time|title|tr|track|u|ul|var|video|wbr|[a-z][a-z0-9:-]*-[a-z0-9:-]*)(?:\s+[^<>]*)?>'
        - '(?is)(?:^|\n)\s*[.#]?[a-z][a-z0-9_-]*(?:\s+[.#]?[a-z][a-z0-9_-]*)?\s*\{[^{}]*:[^{}]*\}'
        - '--[A-Za-z0-9_-]+\s*:'

  - language: kubernetes
    probe_paths:
      extensions: [.go, .yaml, .yml]
    match_any:
      basenames: [kustomization.yaml, kustomization.yml]
      basename_suffixes: [.k8s.yaml, .k8s.yml, .kubernetes.yaml, .kubernetes.yml]
      path_segments: [k8s, kubernetes, manifests]
      path_contains:
        - /config/crd/
        - /config/rbac/
        - /config/default/
        - /config/manager/
        - /config/webhook/
        - /config/prometheus/
        - /config/network-policy/
        - /config/samples/
        - /internal/controller/
        - /controllers/
        - config/crd/
        - config/rbac/
        - config/default/
        - config/manager/
        - config/webhook/
        - config/prometheus/
        - config/network-policy/
        - config/samples/
        - internal/controller/
        - controllers/
      content_contains:
        - '+kubebuilder:'
        - '+k8s:'
        - sigs.k8s.io/controller-runtime
        - k8s.io/apimachinery
        - k8s.io/api/
        - k8s.io/client-go
        - metav1.TypeMeta
      content_regex:
        - '(?is)\bapiVersion:\s*[^\n]+\n.*\bkind:\s*[^\n]+'
