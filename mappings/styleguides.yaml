style_guides:
  go: styleguides/go.md
  python: styleguides/python.md
  javascript: styleguides/javascript.md
  typescript: styleguides/typescript.md
  html: styleguides/html-css.md
  css: styleguides/html-css.md
  scss: styleguides/html-css.md
  csharp: styleguides/csharp.md
  sql: styleguides/sql.md
  shell: styleguides/bash.md
  helm: styleguides/helm.md
  kubernetes: styleguides/kubernetes.md

style_guide_order:
  - go
  - python
  - javascript
  - typescript
  - html
  - css
  - scss
  - csharp
  - sql
  - shell
  - helm
  - kubernetes

extension_overrides:
  javascript:
    - .js
    - .mjs
    - .cjs
    - .jsx
  typescript:
    - .ts
    - .mts
    - .cts
    - .tsx

detectors:
  - language: sql
    probe_paths:
      extensions: [.go, .py, .js, .jsx, .ts, .tsx, .cs, .java, .kt, .rb, .php, .sql]
      path_segments: [migrations, migration, db, database, queries, schema]
    match_any:
      extensions: [.sql]
      content_regex:
        - '(?is)\bselect\b.+\bfrom\b'
        - '(?is)\binsert\s+into\b'
        - '(?is)\bupdate\b.+\bset\b'
        - '(?is)\bdelete\s+from\b'
        - '(?is)\bcreate\s+(?:table|index)\b'
        - '(?is)\balter\s+table\b'
        - '(?is)\bexplain(?:\s+analyze)?\b'
        - '(?is)\bwith\b.+\bselect\b'

  - language: shell
    probe_paths:
      extensions: [.sh, .bash, .zsh, .ksh, .yaml, .yml]
      path_segments: [scripts, bin, ci]
      path_prefixes: [.github/scripts/, .git/hooks/]
      path_contains: [/.github/scripts/, /.git/hooks/, .github/scripts/, .git/hooks/]
    match_any:
      content_contains:
        - shellcheck
        - set -Eeuo pipefail
        - set -euo pipefail
        - '[['
        - declare -a
        - declare -A
        - BASH_SOURCE
        - ' trap '
      content_regex:
        - '(?m)^#!.*(?:bash|/sh|env sh)\b'
        - '\$\{[A-Za-z_][A-Za-z0-9_]*:\?[^}]*\}'

  - language: html
    probe_paths:
      extensions: [.js, .jsx, .ts, .tsx, .vue, .svelte, .astro, .razor, .cshtml, .html, .htm, .css, .scss, .sass]
    match_any:
      extensions: [.jsx, .tsx, .vue, .svelte, .astro, .razor, .cshtml, .html, .htm, .css, .scss, .sass]
      content_contains:
        - <style
        - aria-
        - styled.
        - 'css`'
        - '@media'
      content_regex:
        - '(?is)<(?:a|abbr|address|article|aside|audio|b|base|bdi|bdo|blockquote|body|br|button|canvas|caption|cite|code|col|colgroup|data|datalist|dd|del|details|dfn|dialog|div|dl|dt|em|embed|fieldset|figcaption|figure|footer|form|h[1-6]|head|header|hr|html|i|iframe|img|input|ins|kbd|label|legend|li|link|main|map|mark|menu|meta|meter|nav|noscript|object|ol|option|output|p|picture|pre|progress|q|rp|rt|ruby|s|samp|script|section|select|slot|small|source|span|strong|style|sub|summary|sup|svg|table|tbody|td|template|textarea|tfoot|th|thead|time|title|tr|track|u|ul|var|video|wbr|[a-z][a-z0-9:-]*-[a-z0-9:-]*)(?:\s+[^<>]*)?>'
        - '(?is)(?:^|\n)\s*[.#]?[a-z][a-z0-9_-]*(?:\s+[.#]?[a-z][a-z0-9_-]*)?\s*\{[^{}]*:[^{}]*\}'
        - '--[A-Za-z0-9_-]+\s*:'

  - language: kubernetes
    probe_paths:
      extensions: [.go, .yaml, .yml]
    match_any:
      basenames: [kustomization.yaml, kustomization.yml]
      basename_suffixes: [.k8s.yaml, .k8s.yml, .kubernetes.yaml, .kubernetes.yml]
      path_segments: [k8s, kubernetes, manifests]
      path_contains:
        - /config/crd/
        - /config/rbac/
        - /config/default/
        - /config/manager/
        - /config/webhook/
        - /config/prometheus/
        - /config/network-policy/
        - /config/samples/
        - /internal/controller/
        - /controllers/
        - config/crd/
        - config/rbac/
        - config/default/
        - config/manager/
        - config/webhook/
        - config/prometheus/
        - config/network-policy/
        - config/samples/
        - internal/controller/
        - controllers/
      content_contains:
        - '+kubebuilder:'
        - '+k8s:'
        - sigs.k8s.io/controller-runtime
        - k8s.io/apimachinery
        - k8s.io/api/
        - k8s.io/client-go
        - metav1.TypeMeta
      content_regex:
        - '(?is)\bapiVersion:\s*[^\n]+\n.*\bkind:\s*[^\n]+'
