version: 1
# profile: default          # optional; same as --profile

steps:
  - type: collect-context
  - parallel:
      - lane:
          - type: review:codequality
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:codequality
            config:
              scope: finding
          - type: dedupe:codequality
            config:
              scope: reviewer
      - lane:
          - type: review:security
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:security
            config:
              scope: finding
          - type: dedupe:security
            config:
              scope: reviewer
      - lane:
          - type: review:architecture
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:architecture
            config:
              scope: finding
          - type: dedupe:architecture
            config:
              scope: reviewer
      - lane:
          - type: review:performance
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:performance
            config:
              scope: finding
          - type: dedupe:performance
            config:
              scope: reviewer
      - lane:
          - type: review:testing
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:testing
            config:
              scope: finding
          - type: dedupe:testing
            config:
              scope: reviewer
      - lane:
          - type: review:bestpractices
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:bestpractices
            config:
              scope: finding
          - type: dedupe:bestpractices
            config:
              scope: reviewer
  - pipeline:
      - type: merge
        config:
          scope: cluster
      - type: finalize
        config:
          model: "@small"
          scope: cluster
      - type: verdict
        config:
          model: "@small"
          scope: all
      - type: summarize
        config:
          model: "@small"
          scope: cluster
