version: 1
name: Standard review       # optional; shown above the live progress dashboard
# profile: default          # optional; same as --profile

steps:
  - type: collect-context
    config:
      time_budget:
        max_seconds: 180
  - parallel:
      - lane:
          - type: review:codequality
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:codequality
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:codequality
            config:
              scope: reviewer
              time_budget:
                weight: 15
        name: Code quality
        config:
          time_budget:
            max_seconds: 1500
      - lane:
          - type: review:security
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:security
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:security
            config:
              scope: reviewer
              time_budget:
                weight: 15
        name: Security
        config:
          time_budget:
            max_seconds: 1500
      - lane:
          - type: review:architecture
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:architecture
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:architecture
            config:
              scope: reviewer
              time_budget:
                weight: 15
        name: Architecture
        config:
          time_budget:
            max_seconds: 1500
      - lane:
          - type: review:performance
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:performance
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:performance
            config:
              scope: reviewer
              time_budget:
                weight: 15
        name: Performance
        config:
          time_budget:
            max_seconds: 1500
      - lane:
          - type: review:testing
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:testing
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:testing
            config:
              scope: reviewer
              time_budget:
                weight: 15
        name: Testing
        config:
          time_budget:
            max_seconds: 1500
      - lane:
          - type: review:bestpractices
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:bestpractices
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:bestpractices
            config:
              scope: reviewer
              time_budget:
                weight: 15
        name: Best practices
        config:
          time_budget:
            max_seconds: 1500
  - pipeline:
      - type: merge
        config:
          scope: cluster
          time_budget:
            weight: 30
      - type: finalize
        config:
          model: "@small"
          scope: cluster
          time_budget:
            weight: 40
      - type: verdict
        config:
          model: "@small"
          scope: all
          time_budget:
            weight: 20
      - type: summarize
        config:
          model: "@small"
          scope: cluster
          time_budget:
            weight: 10
    name: Review synthesis
    config:
      time_budget:
        max_seconds: 1200
