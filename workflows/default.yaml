version: 1
# profile: default          # optional; same as --profile

steps:
  - collect-context
  - parallel:
      - lane:
          - type: review:codequality
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - verify:codequality
          - dedupe:codequality
      - lane:
          - type: review:security
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - verify:security
          - dedupe:security
      - lane:
          - type: review:architecture
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - verify:architecture
          - dedupe:architecture
      - lane:
          - type: review:performance
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - verify:performance
          - dedupe:performance
      - lane:
          - type: review:testing
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - verify:testing
          - dedupe:testing
      - lane:
          - type: review:bestpractices
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - verify:bestpractices
          - dedupe:bestpractices
  - merge
  - type: finalize
    config:
      model: "@small"
  - type: summarize
    config:
      model: "@small"
