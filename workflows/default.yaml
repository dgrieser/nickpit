version: 1
# profile: default          # optional; same as --profile

steps:
  - type: collect-context
  - parallel:
      - lane:
          - type: review:codequality
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:codequality
          - type: dedupe:codequality
      - lane:
          - type: review:security
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:security
          - type: dedupe:security
      - lane:
          - type: review:architecture
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:architecture
          - type: dedupe:architecture
      - lane:
          - type: review:performance
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:performance
          - type: dedupe:performance
      - lane:
          - type: review:testing
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:testing
          - type: dedupe:testing
      - lane:
          - type: review:bestpractices
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:bestpractices
          - type: dedupe:bestpractices
  - type: merge
  - type: finalize
    config:
      model: "@small"
  - type: verdict
    config:
      model: "@small"
  - type: summarize
    config:
      model: "@small"
