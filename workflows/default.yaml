version: 1
# profile: default          # optional; same as --profile

steps:
  - type: collect-context
    config:
      time_budget:
        max_seconds: 180
  - parallel:
      - lane:
          - type: review:codequality
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:codequality
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:codequality
            config:
              scope: reviewer
              time_budget:
                weight: 10
        config:
          time_budget:
            max_seconds: 900
      - lane:
          - type: review:security
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:security
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:security
            config:
              scope: reviewer
              time_budget:
                weight: 10
        config:
          time_budget:
            max_seconds: 900
      - lane:
          - type: review:architecture
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:architecture
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:architecture
            config:
              scope: reviewer
              time_budget:
                weight: 10
        config:
          time_budget:
            max_seconds: 900
      - lane:
          - type: review:performance
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:performance
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:performance
            config:
              scope: reviewer
              time_budget:
                weight: 10
        config:
          time_budget:
            max_seconds: 900
      - lane:
          - type: review:testing
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:testing
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:testing
            config:
              scope: reviewer
              time_budget:
                weight: 10
        config:
          time_budget:
            max_seconds: 900
      - lane:
          - type: review:bestpractices
            config:
              mine_reasoning:
                model: "@small"
              compile_findings:
                model: "@small"
          - type: verify:bestpractices
            config:
              scope: finding
              time_budget:
                weight: 35
          - type: dedupe:bestpractices
            config:
              scope: reviewer
              time_budget:
                weight: 10
        config:
          time_budget:
            max_seconds: 900
  - pipeline:
      - type: merge
        config:
          scope: cluster
          time_budget:
            weight: 30
      - type: finalize
        config:
          model: "@small"
          scope: cluster
          time_budget:
            weight: 25
      - type: verdict
        config:
          model: "@small"
          scope: all
          time_budget:
            weight: 30
      - type: summarize
        config:
          model: "@small"
          scope: cluster
          time_budget:
            weight: 15
    config:
      time_budget:
        max_seconds: 900
