version: 1
# profile: default          # optional; same as --profile

steps:
  - collect-context
  - parallel:
      - lane:
          - review:codequality
          - verify:codequality
          - dedupe:codequality
      - lane:
          - review:security
          - verify:security
          - dedupe:security
      - lane:
          - review:architecture
          - verify:architecture
          - dedupe:architecture
      - lane:
          - review:performance
          - verify:performance
          - dedupe:performance
      - lane:
          - review:testing
          - verify:testing
          - dedupe:testing
      - lane:
          - review:bestpractices
          - verify:bestpractices
          - dedupe:bestpractices
  - merge
  - finalize
  - summarize
